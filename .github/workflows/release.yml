name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install glfw glew glm ninja

      - name: Configure
        run: cmake -S . -B build-macos -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-macos -j4

      - name: Package
        run: |
          mkdir -p dist/macos
          cp build-macos/RubiksCube dist/macos/RubiksCube
          cp RubiksCube/FColor.glsl dist/macos/FColor.glsl
          cp RubiksCube/VColor.glsl dist/macos/VColor.glsl
          cp RubiksCube/Click.wav dist/macos/Click.wav
          cd dist/macos && zip -r ../rubiks-macos.zip . && cd ../..

      - uses: actions/upload-artifact@v4
        with:
          name: rubiks-macos
          path: dist/rubiks-macos.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: powershell
        run: |
          choco install cmake -y
          choco install vcpkg -y

      - name: Install vcpkg libraries
        shell: powershell
        run: |
          vcpkg install glfw3:x64-windows glew:x64-windows glm:x64-windows

      - name: Configure
        shell: powershell
        run: |
          cmake -S . -B build-windows -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        shell: powershell
        run: |
          cmake --build build-windows --config Release

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          Copy-Item build-windows/Release/RubiksCube.exe dist/windows/RubiksCube.exe
          Copy-Item RubiksCube/FColor.glsl dist/windows/FColor.glsl
          Copy-Item RubiksCube/VColor.glsl dist/windows/VColor.glsl
          Copy-Item RubiksCube/Click.wav dist/windows/Click.wav
          Compress-Archive -Path dist/windows/* -DestinationPath dist/rubiks-windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: rubiks-windows
          path: dist/rubiks-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rubiks-macos.zip
            dist/rubiks-windows.zip

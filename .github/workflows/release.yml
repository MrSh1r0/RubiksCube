name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install glfw glew glm ninja

      - name: Configure
        run: cmake -S . -B build-macos -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-macos -j4

      - name: Package
        run: |
          mkdir -p dist/macos
          cp build-macos/RubiksCube dist/macos/RubiksCube
          cp RubiksCube/FColor.glsl dist/macos/FColor.glsl
          cp RubiksCube/VColor.glsl dist/macos/VColor.glsl
          cp RubiksCube/Click.wav dist/macos/Click.wav
          cd dist/macos
          zip -r ../rubiks-macos.zip .
          cd ../..

      - uses: actions/upload-artifact@v4
        with:
          name: rubiks-macos
          path: dist/rubiks-macos.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: powershell
        run: |
          if (!(Test-Path C:\vcpkg)) {
            git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          }
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Install vcpkg libraries
        shell: powershell
        run: |
          $VCPKG_ROOT = "C:/vcpkg"
          $env:VCPKG_ROOT = $VCPKG_ROOT
          $env:PATH = "$VCPKG_ROOT;$env:PATH"

          & "$VCPKG_ROOT/vcpkg.exe" install `
            glfw3:x64-windows `
            glew:x64-windows `
            glm:x64-windows

      - name: Configure
        shell: powershell
        run: |
          $VCPKG_ROOT = "C:/vcpkg"
          $env:VCPKG_ROOT = $VCPKG_ROOT
          $env:PATH = "$VCPKG_ROOT;$env:PATH"

          cmake -S . -B build-windows -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        shell: powershell
        run: |
          cmake --build build-windows --config Release

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null

          Copy-Item build-windows/RubiksCube.exe dist/windows/RubiksCube.exe
          Copy-Item RubiksCube/FColor.glsl dist/windows/FColor.glsl
          Copy-Item RubiksCube/VColor.glsl dist/windows/VColor.glsl
          Copy-Item RubiksCube/Click.wav dist/windows/Click.wav

          Compress-Archive `
            -Path dist/windows/* `
            -DestinationPath dist/rubiks-windows.zip `
            -Force

      - uses: actions/upload-artifact@v4
        with:
          name: rubiks-windows
          path: dist/rubiks-windows.zip

  release:
    needs:
      - build-macos
      - build-windows

    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: rubiks-macos
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: rubiks-windows
          path: dist

      - name: Verify artifacts
        run: |
          echo "Checking artifacts..."
          ls -l dist

          test -f dist/rubiks-macos.zip
          test -f dist/rubiks-windows.zip

      - name: Generate release notes
        shell: bash
        run: |
          echo "Generating release notes..."

          git fetch --tags

          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          SHORT_SHA="${GITHUB_SHA::7}"

          {
            if [ -z "$LAST_TAG" ]; then
              echo "## RubiksCube (${SHORT_SHA})"
              echo
              git log --pretty=format:"- %s"
            else
              echo "## Changelogs"
              echo
              git log "$LAST_TAG"..HEAD --pretty=format:"- %s"
            fi
          } > RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:
          tag_name: ${{ github.ref_name }}

          name: "RubiksCube ${{ github.ref_name }}"

          body_path: RELEASE_NOTES.md

          files: |
            dist/rubiks-macos.zip
            dist/rubiks-windows.zip